    }

      animation: blink 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    }

    }

    }
    
    .level-locked {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      padding: 15px 25px;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      animation: fadeIn 0.3s ease;
      padding: 1rem;
    }
    
    .modal-content {
      background: white;
      border-radius: 30px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.4s ease;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from {
        transform: translateY(100px);
        opacity: 0;
      }
      to {

        opacity: 1;
      }
    }
    
    .success-emoji, .fail-emoji {

    }

    function generateLevel(levelNum) {
      const difficulty = Math.floor((levelNum - 1) / 5) + 1;
      const numVillages = 3 + difficulty;
      const missions = 3 + Math.floor(levelNum / 5);
      
      const nodes = [{ id: 0, x: 0, y: 0, type: 'post', name: 'Pos Pusat' }];
      const edges = [];
      
      const minRadius = 150;
      const maxRadius = 280;
      const minDistance = 100;
      
      for (let i = 0; i < numVillages; i++) {
        let x, y, attempts = 0;
        let validPosition = false;
        
        while (!validPosition && attempts < 50) {
          const angle = Math.random() * Math.PI * 2;
          const radius = minRadius + Math.random() * (maxRadius - minRadius);
          x = Math.cos(angle) * radius;
          y = Math.sin(angle) * radius;
          
          validPosition = true;
          for (const node of nodes) {
            const dist = Math.sqrt((x - node.x) ** 2 + (y - node.y) ** 2);
            if (dist < minDistance) {
              validPosition = false;
              break;
            }
          }
          attempts++;
        }
        
        nodes.push({
          id: i + 1,
          x: x || Math.cos(i * Math.PI * 2 / numVillages) * 200,
          y: y || Math.sin(i * Math.PI * 2 / numVillages) * 200,
          type: 'village',
          name: `Desa ${String.fromCharCode(65 + i)}`
        });
      }
      
      const villageIds = [];
      for (let i = 1; i <= numVillages; i++) {
        villageIds.push(i);
      }
      
      for (let i = villageIds.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [villageIds[i], villageIds[j]] = [villageIds[j], villageIds[i]];
      }
      
      const correctPath = [0, ...villageIds, 0];
      
      let totalDistance = 0;
      for (let i = 0; i < correctPath.length - 1; i++) {
        const from = correctPath[i];
        const to = correctPath[i + 1];
        const distance = 10 + Math.floor(Math.random() * 15);
        totalDistance += distance;
        edges.push({ from, to, distance });
      }
      
      for (let i = 1; i <= numVillages; i++) {
        for (let j = i + 1; j <= numVillages; j++) {
          if (!edges.some(e => (e.from === i && e.to === j) || (e.from === j && e.to === i))) {
            const wrongDistance = totalDistance + 10 + Math.floor(Math.random() * 20);
            edges.push({ from: i, to: j, distance: wrongDistance });
          }
        }
      }
      
      return {
        nodes,
        edges,
        correctPath,
        totalFuel: totalDistance + 5,
        missions,
        timeLimit: 120 + (difficulty * 20)
      };
    }

    function checkBadges(user, levelStats) {
      const earnedBadges = user.badges ? JSON.parse(user.badges) : [];
      const newBadges = [];
      
      BADGES.forEach(badge => {
        if (earnedBadges.includes(badge.id)) return;
        
        let earned = false;
        switch (badge.requirement.type) {
          case 'level':
            earned = user.current_level >= badge.requirement.value;
            break;
          case 'score':
            earned = user.total_score >= badge.requirement.value;
            break;
          case 'fuel':
            if (levelStats && levelStats.fuelPercent <= badge.requirement.value) earned = true;
            break;
          case 'time':
            if (levelStats && levelStats.timeTaken <= badge.requirement.value) earned = true;
            break;
          case 'perfect':
            if (levelStats && levelStats.isPerfect) earned = true;
            break;
          case 'streak':
            const completedMissions = user.completed_missions ? JSON.parse(user.completed_missions) : [];
            if (completedMissions.length >= badge.requirement.value) earned = true;
            break;
        }
        
        if (earned) {
          earnedBadges.push(badge.id);
          newBadges.push(badge);
        }
      });
      
      if (newBadges.length > 0) {
        user.badges = JSON.stringify(earnedBadges);
        newBadges.forEach(badge => {
          showToast(`🎉 Lencana Baru: ${badge.name}!`, 'success');
        });
      }
    }

                 <button onclick="resetRoute()" class="flex-1 min-w-[80px] md:min-w-[120px] bg-gradient-to-t from-amber-600 to-amber-400 border-2 border-white text-white font-bold py-2 md:py-3 rounded-xl shadow-lg hover:scale-105 transition-transform text-sm md:text-xl active:scale-95">Reset</button>
                 <button onclick="goToLevelSelect()" class="flex-1 min-w-[80px] md:min-w-[120px] bg-gradient-to-t from-indigo-600 to-indigo-400 border-2 border-white text-white font-bold py-2 md:py-3 rounded-xl shadow-lg hover:scale-105 transition-transform text-sm md:text-xl active:scale-95">Menu</button>

    window.toggleDistanceLabels = function() {
        gameState.showDistanceLabels = !gameState.showDistanceLabels;
        const btn = document.getElementById('uiToggleBtn');
        const knob = document.getElementById('uiToggleKnob');
        if (btn && knob) {
            btn.className = `w-10 md:w-12 h-5 md:h-6 rounded-full mx-auto relative transition-colors duration-300 ${gameState.showDistanceLabels ? 'bg-emerald-500' : 'bg-gray-500'}`;
            knob.className = `absolute top-[2px] md:top-1 w-4 h-4 rounded-full bg-white transition-all duration-300 ${gameState.showDistanceLabels ? 'right-1' : 'left-1'}`;
        }
        drawGame();
    }

    window.populateDistanceInfo = function() {
        const listEl = document.getElementById('uiDistanceList');
        if (!listEl) return;
        listEl.innerHTML = '';
        
        const sortedEdges = [...gameState.edges].sort((a, b) => {
            const nameA = gameState.nodes.find(n => n.id === a.from)?.name || '';
            const nameB = gameState.nodes.find(n => n.id === b.to)?.name || '';
            return (nameA + nameB).localeCompare(nameA + nameB);
        });
        
        sortedEdges.forEach(edge => {
            const fromName = gameState.nodes.find(n => n.id === edge.from)?.name;
            const toName = gameState.nodes.find(n => n.id === edge.to)?.name;
            listEl.innerHTML += `<div class="flex justify-between border-b border-gray-600/50 pb-1 mb-1 items-center">
                <span class="truncate pr-2">${fromName} ↔ ${toName}</span>
                <span class="text-emerald-400 font-bold ml-auto whitespace-nowrap">${edge.distance} KM</span>
            </div>`;
        });
    }

    window.updateGameUI = function() {
        const fuelEl = document.getElementById('uiFuelVal');
        const fuelBar = document.getElementById('uiFuelBar');
        const timerEl = document.getElementById('uiTimerVal');
        const livesEl = document.getElementById('uiLivesVal');
        
        if (fuelEl) fuelEl.textContent = Math.ceil(gameState.fuel);
        if (fuelBar) {
            const percent = Math.max(0, (gameState.fuel / gameState.maxFuel) * 100);
            fuelBar.style.width = percent + '%';
            fuelBar.className = `h-full transition-all duration-300 ${percent < 20 ? 'bg-red-500' : percent < 50 ? 'bg-amber-500' : 'bg-emerald-500'}`;
        }
        if (timerEl) timerEl.textContent = Math.ceil(gameState.timer);
        if (livesEl) livesEl.textContent = '❤️'.repeat(gameState.lives) + '🤍'.repeat(3 - gameState.lives);
    }

    function drawGame() {
      const canvas = document.getElementById('gameCanvas');
      if (!canvas) return;
      
      const ctx = canvas.getContext('2d');
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      
      // Dynamic scaling so the graph always fits the screen perfectly
      const minDimension = Math.min(canvas.width, canvas.height);
      const uiPadding = window.innerWidth < 768 ? 160 : 250; // Extra padding for overlay UI
      const availableSize = Math.max(200, minDimension - uiPadding);
      const scaleFactor = availableSize / 560; 
      const nodeSize = window.innerWidth < 768 ? 20 : 30;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw Edges
      gameState.edges.forEach(edge => {
        const fromNode = gameState.nodes.find(n => n.id === edge.from);
        const toNode = gameState.nodes.find(n => n.id === edge.to);
        
        const x1 = centerX + (fromNode.x * scaleFactor);
        const y1 = centerY + (fromNode.y * scaleFactor);
        const x2 = centerX + (toNode.x * scaleFactor);
        const y2 = centerY + (toNode.y * scaleFactor);
        
        ctx.strokeStyle = '#94a3b8'; // gray-400
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        
        // Jarak Toggles on canvas
        if (gameState.showDistanceLabels) {
          const midX = (x1 + x2) / 2;
          const midY = (y1 + y2) / 2;
          const circleRadius = window.innerWidth < 768 ? 14 : 18;
          
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(midX, midY, circleRadius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#6366f1';
          ctx.lineWidth = 2;
          ctx.stroke();
          
          ctx.fillStyle = '#1e293b';
          ctx.font = `bold ${window.innerWidth < 768 ? 10 : 12}px Fredoka`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(`${edge.distance}`, midX, midY);
        }
      });
      
      // Draw Passed Path Route
      if (gameState.currentRoute.length > 1) {
        for (let i = 0; i < gameState.currentRoute.length - 1; i++) {
          const fromId = gameState.currentRoute[i];
          const toId = gameState.currentRoute[i + 1];
          const fromNode = gameState.nodes.find(n => n.id === fromId);
          const toNode = gameState.nodes.find(n => n.id === toId);
          
          ctx.strokeStyle = '#10b981'; // emerald-500
          ctx.lineWidth = window.innerWidth < 768 ? 4 : 6;
          ctx.beginPath();
          ctx.moveTo(centerX + (fromNode.x * scaleFactor), centerY + (fromNode.y * scaleFactor));
          ctx.lineTo(centerX + (toNode.x * scaleFactor), centerY + (toNode.y * scaleFactor));
          ctx.stroke();
        }
      }
      
      // Draw Nodes
      gameState.nodes.forEach(node => {
        const x = centerX + (node.x * scaleFactor);
        const y = centerY + (node.y * scaleFactor);
        const isVisited = gameState.visitedNodes.has(node.id);
        
        if (node.type === 'post') {
          ctx.fillStyle = isVisited ? '#ef4444' : '#f87171'; // Red
        } else {
          ctx.fillStyle = isVisited ? '#10b981' : '#34d399'; // Emerald
        }
        
        ctx.beginPath();
        ctx.arc(x, y, nodeSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = window.innerWidth < 768 ? 3 : 4;
        ctx.stroke();
        
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${window.innerWidth < 768 ? 9 : 12}px Fredoka`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(node.name, x, y);
        
        // Highlight Selected Node
        if (gameState.selectedNode === node.id) {
          ctx.strokeStyle = '#fbbf24'; // amber-400
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(x, y, nodeSize + 6, 0, Math.PI * 2);
          ctx.stroke();
        }
      });
    }

    function handleCanvasClick(event) {
      const canvas = document.getElementById('gameCanvas');
      if (!canvas) return;
      
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const uiPadding = window.innerWidth < 768 ? 160 : 250;
      const availableSize = Math.max(200, Math.min(canvas.width, canvas.height) - uiPadding);
      const scaleFactor = availableSize / 560; 
      const nodeSize = window.innerWidth < 768 ? 20 : 30;
      
      for (const node of gameState.nodes) {
        const nodeX = centerX + (node.x * scaleFactor);
        const nodeY = centerY + (node.y * scaleFactor);
        const distance = Math.sqrt((x - nodeX) ** 2 + (y - nodeY) ** 2);
        
        if (distance <= nodeSize + 10) { // Slight padding for easier touch
          selectNode(node.id);
          return;
        }
      }
    }

    window.selectNode = function(nodeId) {
      if (gameState.currentRoute.length === 0) {
        gameState.currentRoute.push(0);
      }
      
      const lastNode = gameState.currentRoute[gameState.currentRoute.length - 1];
      if (nodeId === lastNode) return;
      
      const edge = gameState.edges.find(e => (e.from === lastNode && e.to === nodeId) || (e.from === nodeId && e.to === lastNode));
      if (!edge) {
        showToast('Tidak ada jalan pintas ke desa ini!', 'error');
        return;
      }
      if (gameState.fuel < edge.distance) {
        loseLife('Bensin habis!');
        return;
      }
      
      gameState.fuel -= edge.distance;
      gameState.currentRoute.push(nodeId);
      gameState.visitedNodes.add(nodeId);
      gameState.selectedNode = nodeId;
      
      updateGameUI();
      drawGame();
    }

    window.checkDelivery = function() {
      const allVillagesVisited = gameState.nodes
        .filter(n => n.type === 'village')
        .every(n => gameState.visitedNodes.has(n.id));
      
      const lastNode = gameState.currentRoute[gameState.currentRoute.length - 1];
      
      if (!allVillagesVisited) {
        showToast('Tunggu, belum mengunjungi semua desa!', 'error');
        return;
      }
      if (lastNode !== 0) {
        showToast('Harus kembali ke Pos Pusat terlebih dahulu!', 'error');
        return;
      }
      
      completeLevel();
    }

    window.resetRoute = function() {
      gameState.currentRoute = [0];
      gameState.visitedNodes = new Set([0]);
      gameState.fuel = gameState.maxFuel;
      gameState.selectedNode = null;
      updateGameUI();
      drawGame();
    }

    function completeLevel() {
      if (timerInterval) clearInterval(timerInterval);
      
      const timeBonus = Math.floor(gameState.timer * 10);
      const fuelBonus = Math.floor(gameState.fuel * 5);
      const levelScore = 1000 + timeBonus + fuelBonus;
      
      const timeTaken = Math.floor((Date.now() - gameState.startTime) / 1000);
      const fuelPercent = (gameState.fuel / gameState.maxFuel) * 100;
      const isPerfect = gameState.lives === gameState.startLives;
      const levelStats = { timeTaken, fuelPercent, isPerfect };
      
      const levelScores = currentUser.level_scores ? JSON.parse(currentUser.level_scores) : {};
      const previousBestScore = levelScores[gameState.level] || 0;
      
      let scoreAdded = 0;
      let isNewRecord = false;
      
      if (levelScore > previousBestScore) {
        scoreAdded = levelScore - previousBestScore;
        currentUser.total_score += scoreAdded;
        levelScores[gameState.level] = levelScore;
        currentUser.level_scores = JSON.stringify(levelScores);
        isNewRecord = true;
      }
      
      currentUser.current_level = Math.max(currentUser.current_level, gameState.level + 1);
      const completedMissions = currentUser.completed_missions ? JSON.parse(currentUser.completed_missions) : [];
      completedMissions.push(gameState.level);
      currentUser.completed_missions = JSON.stringify(completedMissions);
      
      checkBadges(currentUser, levelStats);
      gameState.lives = 3;
      showSuccessModal(levelScore, timeBonus, fuelBonus, scoreAdded, isNewRecord, previousBestScore);
    }
    
    function showSuccessModal(levelScore, timeBonus, fuelBonus, scoreAdded, isNewRecord, previousBestScore) {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      
      let recordMessage = '';
      if (isNewRecord) {
        if (previousBestScore === 0) {
          recordMessage = `<p style="font-size: 18px; color: #10b981; margin: 10px 0; font-weight: bold;">✨ Level Terselesaikan!</p>`;
        } else {
          recordMessage = `<p style="font-size: 18px; color: #f59e0b; margin: 10px 0; font-weight: bold;">🎯 REKOR BARU! (Sebelumnya: ${previousBestScore})</p>`;
        }
      } else {
        recordMessage = `<p style="font-size: 18px; color: #64748b; margin: 10px 0;">Skor Terbaik: ${previousBestScore}</p>`;
      }
      
      modal.innerHTML = `
        <div class="modal-content">
          <img src="oke.png" alt="Berhasil" class="success-image drop-shadow-lg" onerror="this.outerHTML='<div class=\\'success-emoji\\'>🎉</div>';">
          <h2 style="font-size: 36px; font-weight: bold; color: #10b981; margin: 20px 0;">Paket Telah Terkirim!</h2>
          <div style="background: #f0fdf4; border-radius: 15px; padding: 20px; margin: 20px 0; border: 2px solid #a7f3d0;">
            <p style="font-size: 24px; font-weight: bold; color: #2d3748; margin: 10px 0;">Skor: <span style="color: #10b981;">${levelScore}</span></p>
            <div style="font-size: 16px; color: #475569; margin-top: 15px; font-weight: 500;">
              <p style="margin: 5px 0;">⏱️ Bonus Waktu: +${timeBonus}</p>
              <p style="margin: 5px 0;">⛽ Bonus Bensin: +${fuelBonus}</p>
            </div>
            ${recordMessage}
            ${scoreAdded > 0 ? `<p style="font-size: 20px; color: #059669; margin: 10px 0; font-weight: bold;">Skor Bertambah: +${scoreAdded}</p>` : ``}
          </div>
          <button onclick="this.closest('.modal-overlay').remove(); gameState.screen = 'levelSelect'; render();" class="btn-primary text-white px-8 py-3 rounded-xl text-lg font-bold hover:scale-105 transition-transform" style="margin-top: 20px;">
            MENU LEVEL
          </button>
        </div>
      `;
      document.body.appendChild(modal);
    }

    function loseLife(reason) {
      if (timerInterval) clearInterval(timerInterval);
      gameState.lives--;
      updateGameUI();
      
      if (reason === 'Bensin habis!') {
        showFuelOutModal();
      } else {
        showToast(reason, 'error');
        if (gameState.lives <= 0) {
          gameOver();
        } else {
          resetRoute();
          startTimer();
        }
      }
    }
    
    function showFuelOutModal() {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal-content">
          <img src="sad.png" alt="Gagal" class="fail-image drop-shadow-lg" onerror="this.outerHTML='<div class=\\'fail-emoji\\'>😢</div>';">
          <h2 style="font-size: 36px; font-weight: bold; color: #ef4444; margin: 20px 0;">Yah, Bensin Habis!</h2>
          <p style="font-size: 24px; color: #64748b; margin: 10px 0;">Motor Mogok</p>
          <div style="background: #fef2f2; border-radius: 15px; padding: 20px; margin: 20px 0; border: 2px solid #fecaca;">
            <p style="font-size: 18px; color: #2d3748; font-weight:bold;">
              Sisa Nyawa: <span style="font-size: 24px; letter-spacing: 5px;">${'❤️'.repeat(gameState.lives)}${'🤍'.repeat(3 - gameState.lives)}</span>
            </p>
          </div>
          <button onclick="this.closest('.modal-overlay').remove(); if(gameState.lives<=0){gameState.lives=3; gameState.screen='levelSelect'; render();}else{resetRoute();startTimer();}" class="btn-primary text-white px-8 py-3 rounded-xl text-lg font-bold hover:scale-105 transition-transform" style="margin-top: 20px;">
            ${gameState.lives > 0 ? 'COBA LAGI' : 'KEMBALI'}
          </button>
        </div>
      `;
      document.body.appendChild(modal);
    }

    function gameOver() {
      showToast('Game Over! Nyawa habis.', 'error');
      setTimeout(() => {
        gameState.lives = 3;
        gameState.screen = 'levelSelect';
        render();
      }, 2000);
    }

    let timerInterval = null;

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        gameState.timer--;
        updateGameUI();
        if (gameState.timer <= 0) {
          clearInterval(timerInterval);
          loseLife('Waktu habis!');
        }
      }, 1000);
    }

    window.goToAuth = function() { gameState.screen = 'auth'; render(); };
    window.goToMenu = function() { if (timerInterval) clearInterval(timerInterval); gameState.screen = 'menu'; render(); };
    window.goToLevelSelect = function(diff) { 
        if(diff) gameState.difficulty = diff;
        gameState.screen = 'levelSelect'; 
        render(); 
    };

    window.startLevel = function(levelNum) {
      gameState.level = levelNum;
      gameState.lives = 3;
      gameState.screen = 'game';
      render();
      
      setTimeout(() => {
        populateDistanceInfo();
        updateGameUI();
        drawGame();
        startTimer();
        
        const canvas = document.getElementById('gameCanvas');
        if (canvas) canvas.addEventListener('click', handleCanvasClick);
        window.addEventListener('resize', drawGame);
      }, 100);
    }

    window.logout = function() { currentUser = null; gameState.screen = 'splash'; render(); };

    function render() {
      const app = document.getElementById('app');
      switch (gameState.screen) {
        case 'splash': app.innerHTML = renderSplash(); break;
        case 'auth': app.innerHTML = renderAuth(); attachAuthListener(); break;
        case 'menu': app.innerHTML = renderMenu(); break;
        case 'levelSelect': app.innerHTML = renderLevelSelect(); break;
        case 'game': app.innerHTML = renderGame(); break;
      }
    }

    async function onConfigChange(config) {
      document.getElementById('footerText').textContent = config.footer_text || defaultConfig.footer_text;
      const fontFamily = config.font_family || defaultConfig.font_family;
      const fontSize = config.font_size || defaultConfig.font_size;
      document.body.style.fontFamily = `${fontFamily}, sans-serif`;
      document.body.style.fontSize = `${fontSize}px`;
      render();
    }

    async function init() {
      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange,
          mapToCapabilities: (config) => ({
            recolorables: [
              { get: () => config.primary_color || defaultConfig.primary_color, set: (value) => { config.primary_color = value; window.elementSdk.setConfig({ primary_color: value }); } },
              { get: () => config.secondary_color || defaultConfig.secondary_color, set: (value) => { config.secondary_color = value; window.elementSdk.setConfig({ secondary_color: value }); } },
              { get: () => config.accent_color || defaultConfig.accent_color, set: (value) => { config.accent_color = value; window.elementSdk.setConfig({ accent_color: value }); } },
              { get: () => config.background_color || defaultConfig.background_color, set: (value) => { config.background_color = value; window.elementSdk.setConfig({ background_color: value }); } },
              { get: () => config.text_color || defaultConfig.text_color, set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); } }
            ],
            borderables: [],
            fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (value) => { config.font_family = value; window.elementSdk.setConfig({ font_family: value }); } },
            fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (value) => { config.font_size = value; window.elementSdk.setConfig({ font_size: value }); } }
          }),
          mapToEditPanelValues: (config) => new Map([
            ['game_title', config.game_title || defaultConfig.game_title],
            ['start_button_text', config.start_button_text || defaultConfig.start_button_text],
            ['login_title', config.login_title || defaultConfig.login_title],
            ['footer_text', config.footer_text || defaultConfig.footer_text]
          ])
        });
      }
      render();
    }

    init();
  </script>
 </body>
</html>
